type Service @entity(immutable: false) {
  id: ID! # service ID
  multisig: Bytes
  agentIds: [Int!]!
}

type Multisig @entity(immutable: false) {
  id: Bytes! # multisig address
  serviceId: Int!
  creator: Bytes!
  creationTimestamp: BigInt!
  txHash: Bytes!
  agentIds: [Int!]!
}

type AgentRegistration @entity(immutable: true) {
  id: ID! # serviceId-agentId-blockNumber-logIndex
  serviceId: String!
  agentId: Int!
  operator: Bytes!
  agentInstance: Bytes!
  registrationTimestamp: BigInt!
  blockNumber: BigInt!
  transactionHash: Bytes!
}

type DailyServiceActivity @entity(immutable: true) {
  id: ID!
  service: Service!
  dayTimestamp: BigInt!
  agentIds: [Int!]!
}

type DailyActiveAgent @entity(immutable: false) {
  id: ID!
  dayTimestamp: BigInt!
  count: Int!
  agentIds: [Int!]!
}

type DailyAgentActivity @entity(immutable: false) {
  id: ID! # dayTimestamp-agentId
  agentId: Int!
  dayTimestamp: BigInt!
  txCount: Int!
}

